<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <!-- Подключаем скрипт Телеграма первым -->
    <script src="https://telegram.org"></script>
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background: #fff; margin: 0; padding: 20px; color: #333; -webkit-tap-highlight-color: transparent; }
        .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; color: #8e8e93; font-size: 13px; }
        .close-btn { font-size: 24px; cursor: pointer; color: #000; padding: 5px; }
        .question-text { font-size: 17px; font-weight: 600; line-height: 1.4; margin-bottom: 25px; min-height: 50px; }
        .option { display: flex; align-items: center; padding: 16px; border: 1px solid #e5e5ea; border-radius: 12px; margin-bottom: 10px; cursor: pointer; position: relative; transition: all 0.2s ease; }
        .check-icon { width: 20px; height: 20px; border: 2px solid #d1d1d6; border-radius: 4px; margin-right: 12px; flex-shrink: 0; display: flex; align-items: center; justify-content: center; font-size: 14px; font-weight: bold; }
        .option.selected { border-color: #3478f6; background-color: #f2f8ff; }
        .option.selected .check-icon { border-color: #3478f6; background-color: #3478f6; color: #fff; }
        .option.selected .check-icon::after { content: "✓"; }
        .option.correct { background-color: #e8f9ee !important; border-color: #4cd964 !important; pointer-events: none; }
        .option.correct .check-icon { border-color: #4cd964 !important; background-color: #4cd964 !important; color: #fff; }
        .option.correct .check-icon::after { content: "✓"; }
        .option.correct::after { content: "✓"; position: absolute; right: 20px; color: #4cd964; font-size: 20px; font-weight: bold; }
        .option.wrong { background-color: #fff2f1 !important; border-color: #ff3b30 !important; pointer-events: none; }
        .option.wrong .check-icon { border-color: #ff3b30 !important; background-color: #ff3b30 !important; color: #fff; }
        .option.wrong .check-icon::after { content: "✕"; }
        .option.wrong::after { content: "✕"; position: absolute; right: 20px; color: #ff3b30; font-size: 20px; font-weight: bold; }
        .footer { position: fixed; bottom: 0; left: 0; width: 100%; padding: 16px 20px; background: #fff; border-top: 1px solid #efeff4; display: flex; justify-content: space-between; align-items: center; box-sizing: border-box; }
        .btn-main { background: #3478f6; color: #fff; border: none; padding: 14px 35px; border-radius: 10px; font-size: 16px; font-weight: bold; cursor: pointer; transition: opacity 0.2s; opacity: 0.5; }
        .btn-active { opacity: 1; }
        .btn-next { background: #ff5722 !important; opacity: 1; }
        .progress { color: #8e8e93; font-size: 16px; }
    </style>
</head>
<body>
    <div class="header">
        <div class="close-btn" onclick="window.Telegram.WebApp.close()">✕</div>
        <div id="top-counter">1 / 5</div>
    </div>
    <div class="question-text" id="q-text">Загрузка вопроса...</div>
    <div id="options-box"></div>
    <div class="footer">
        <button class="btn-main" id="action-btn" disabled>Ответить</button>
        <div class="progress" id="bottom-counter">1 / 5</div>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();

        const questions =, correct: 0 },
            { text: "В каком году была Куликовская битва?", options: ["1240 год", "1380 год", "1480 год"], correct: 1 },
            { text: "Основание Санкт-Петербурга?", options: ["1703 год", "1721 год", "1712 год"], correct: 0 },
            { text: "Отмена крепостного права в России?", options: ["1812 год", "1861 год", "1881 год"], correct: 1 },
            { text: "Первый полет человека в космос?", options: ["1957 год", "1961 год", "1969 год"], correct: 1 }
        ];

        let currentQ = 0;
        let selectedIdx = null;
        let isAnswered = false;

        function render() {
            const q = questions[currentQ];
            document.getElementById('q-text').innerText = q.text;
            document.getElementById('top-counter').innerText = `${currentQ + 1} / ${questions.length}`;
            document.getElementById('bottom-counter').innerText = `${currentQ + 1} / ${questions.length}`;
            
            const box = document.getElementById('options-box');
            box.innerHTML = '';
            isAnswered = false;
            selectedIdx = null;
            
            const btn = document.getElementById('action-btn');
            btn.innerText = "Ответить";
            btn.disabled = true;
            btn.classList.remove('btn-active', 'btn-next');
            btn.onclick = check;

            q.options.forEach((opt, i) => {
                const div = document.createElement('div');
                div.className = 'option';
                div.innerHTML = `<div class="check-icon"></div><span>${opt}</span>`;
                div.onclick = () => select(i, div);
                box.appendChild(div);
            });
        }

        function select(idx, el) {
            if (isAnswered) return;
            selectedIdx = idx;
            document.querySelectorAll('.option').forEach(item => item.classList.remove('selected'));
            el.classList.add('selected');
            const btn = document.getElementById('action-btn');
            btn.disabled = false;
            btn.classList.add('btn-active');
        }

        function check() {
            isAnswered = true;
            const q = questions[currentQ];
            const options = document.querySelectorAll('.option');
            const btn = document.getElementById('action-btn');

            options.forEach((el, i) => {
                el.classList.remove('selected');
                if (i === q.correct) el.classList.add('correct');
                else if (i === selectedIdx) el.classList.add('wrong');
            });

            btn.innerText = "Дальше";
            btn.classList.add('btn-next');
            btn.onclick = next;
        }

        function next() {
            currentQ++;
            if (currentQ < questions.length) render();
            else { alert("Тест пройден!"); tg.close(); }
        }

        // Ждем полной загрузки страницы перед запуском
        window.addEventListener('load', () => {
            tg.ready();
            render();
        });
    </script>
</body>
</html>
