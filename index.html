<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        *{margin:0;padding:0;box-sizing:border-box}body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;min-height:100vh;padding-bottom:130px;background:linear-gradient(135deg,#fff5f0,#ffe8f0)}.header{background:rgba(255,255,255,0.85);backdrop-filter:blur(20px);padding:16px;display:flex;justify-content:space-between;align-items:center;border-bottom:1px solid rgba(255,200,210,0.3)}.date-icon{font-size:16px;font-weight:500;background:rgba(212,140,156,0.2);padding:8px 16px;border-radius:30px;color:#b86f8c}.close-btn{font-size:24px;cursor:pointer;color:#b86f8c;background:rgba(255,255,255,0.5);border:none;width:40px;height:40px;border-radius:40px}.tabs{display:flex;background:rgba(255,255,255,0.85);backdrop-filter:blur(20px);padding:8px 16px;gap:16px;border-bottom:1px solid rgba(255,200,210,0.3);overflow-x:auto}.tab{font-size:14px;color:#6a5a6a;padding:8px 0;cursor:pointer;border-bottom:2px solid transparent;white-space:nowrap}.tab.active{color:#d48c9c;border-bottom-color:#d48c9c}.content{padding:16px}.screen{display:block}.screen.hidden{display:none}.subject-card{background:rgba(255,255,255,0.9);backdrop-filter:blur(10px);border-radius:28px;padding:20px;margin-bottom:20px}.subject-title{font-size:22px;font-weight:700;margin-bottom:16px;background:linear-gradient(135deg,#b86f8c,#e89f7e);-webkit-background-clip:text;-webkit-text-fill-color:transparent}.lesson-item{display:flex;justify-content:space-between;align-items:center;padding:14px;margin-top:10px;background:rgba(255,248,250,0.9);border-radius:20px;cursor:pointer;border:1px solid rgba(212,140,156,0.3)}.lesson-title{font-weight:600;color:#5a4a5a}.lesson-meta{font-size:12px;color:#b86f8c}.lesson-status{font-size:18px;margin-left:8px}.quiz-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:12px}.quiz-counter{font-size:14px;font-weight:500;color:#d48c9c;background:rgba(212,140,156,0.15);padding:6px 12px;border-radius:30px}.quiz-card{background:rgba(255,255,255,0.95);border-radius:28px;padding:24px}.question-text{font-size:20px;font-weight:600;margin-bottom:24px;color:#4a3a4a}.option{padding:14px;border:2px solid rgba(212,140,156,0.3);border-radius:20px;margin-bottom:10px;cursor:pointer;background:white}.option.selected{border-color:#d48c9c;background:rgba(212,140,156,0.1)}.option.correct{border-color:#9bcd9b;background:rgba(155,205,155,0.2)}.option.wrong{border-color:#e89f7e;background:rgba(232,159,126,0.15)}.result-card{background:rgba(255,255,255,0.95);border-radius:28px;padding:32px 20px;text-align:center}.result-score{font-size:56px;font-weight:800;background:linear-gradient(135deg,#b86f8c,#e89f7e);-webkit-background-clip:text;-webkit-text-fill-color:transparent;margin:20px 0}.footer{position:fixed;bottom:0;left:0;width:100%;padding:12px 16px;background:rgba(255,255,255,0.9);backdrop-filter:blur(20px);border-top:1px solid rgba(255,200,210,0.3);display:flex;justify-content:center;gap:40px;z-index:10}.social-item{text-align:center;text-decoration:none;color:#b86f8c;transition:transform 0.2s}.social-item:hover{transform:translateY(-3px)}.social-icon{font-size:28px;margin-bottom:4px;display:block}.social-label{font-size:10px;font-weight:500;letter-spacing:0.5px}.btn-main{width:100%;background:linear-gradient(135deg,#d48c9c,#e89f7e);color:white;border:none;padding:14px;border-radius:24px;font-size:16px;font-weight:bold;cursor:pointer;opacity:0.5}.btn-main.active{opacity:1}.btn-secondary{width:100%;background:rgba(212,140,156,0.2);color:#d48c9c;border:none;padding:14px;border-radius:24px;font-weight:500;margin-top:12px;cursor:pointer}.progress-bar{height:8px;background:rgba(212,140,156,0.2);border-radius:10px;overflow:hidden;margin-bottom:20px}.progress-fill{height:100%;width:0%;background:linear-gradient(90deg,#d48c9c,#e89f7e)}.stat-card{background:rgba(255,255,255,0.9);border-radius:28px;padding:20px;margin-bottom:16px;text-align:center}.rank-item{display:flex;align-items:center;gap:12px;padding:12px;background:rgba(255,255,255,0.9);border-radius:20px;margin-bottom:8px}.rank-avatar{width:44px;height:44px;border-radius:44px;background:#d48c9c;display:flex;align-items:center;justify-content:center;font-size:24px}
    </style>
</head>
<body>
<div id="mainScreen" class="screen">
    <div class="header"><div class="date-icon" id="currentDate"></div><button class="close-btn" onclick="window.Telegram?.WebApp?.close()">✕</button></div>
    <div class="tabs"><div class="tab active" data-tab="subjects">📚 История</div><div class="tab" data-tab="stats">📊 Статистика</div><div class="tab" data-tab="rating">🏆 Рейтинг</div><div class="tab" data-tab="profile">👤 Профиль</div></div>
    <div class="content"><div id="subjectsList"></div><div id="statsContent" style="display:none;"></div><div id="ratingList" style="display:none;"></div><div id="profileContent" style="display:none;"></div></div>
    <div class="footer">
        <a href="https://t.me/histforyou" target="_blank" class="social-item">
            <i class="fab fa-telegram-plane social-icon"></i>
            <div class="social-label">TELEGRAM КАНАЛ</div>
        </a>
        <a href="https://t.me/swayzeee" target="_blank" class="social-item">
            <i class="fab fa-telegram-plane social-icon"></i>
            <div class="social-label">МОЙ TELEGRAM</div>
        </a>
        <a href="https://www.instagram.com/yakimisha_oleg" target="_blank" class="social-item">
            <i class="fab fa-instagram social-icon"></i>
            <div class="social-label">МОЙ INSTAGRAM</div>
        </a>
    </div>
</div>
<div id="quizScreen" class="screen" style="display:none;">
    <div class="header"><button class="close-btn" onclick="backToMain()">←</button><div id="quizTitle"></div><div style="width:40px"></div></div>
    <div class="content">
        <div class="quiz-header">
            <div class="progress-bar" style="flex:1; margin-right:12px"><div class="progress-fill" id="progressFill"></div></div>
            <div class="quiz-counter" id="questionCounter">0 / 0</div>
        </div>
        <div class="quiz-card">
            <div class="question-text" id="questionText"></div>
            <div id="optionsBox"></div>
        </div>
    </div>
    <div class="footer"><button class="btn-main" id="actionBtn" disabled onclick="handleAnswer()">Ответить</button></div>
</div>
<div id="resultScreen" class="screen" style="display:none;">
    <div class="header"><button class="close-btn" onclick="backToMain()">←</button><div>Результат</div><div style="width:40px"></div></div>
    <div class="content"><div class="result-card"><div class="result-score" id="resultScore"></div><button class="btn-main" onclick="backToMain()">На главную</button><button class="btn-secondary" onclick="retryQuiz()">Пройти заново</button></div></div>
</div>
<script>
const tg = window.Telegram?.WebApp; if (tg) { tg.expand(); tg.ready(); }
const SUPABASE_URL = "https://roakqdkabmtsemavyseh.supabase.co";
const SUPABASE_KEY = "sb_publishable_dYmhQWEHHhUhcqLbxr6M_w_rhrk_S7z";
const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

let subjects = [
    { name: "🌍 Всемирная история", lessons: [] },
    { name: "👤 Исторические личности", lessons: [] },
    { name: "🇧🇾 История Беларуси", lessons: [] },
    { name: "📖 Термины", lessons: [] }
];
let historyFacts = [];

async function loadData() {
    try {
        const [worldRes, belarusRes, additionalRes, factsRes] = await Promise.all([
            fetch('https://swayzee123.github.io/my-history-bot/worldLessons.json'),
            fetch('https://swayzee123.github.io/my-history-bot/belarusLessons.json'),
            fetch('https://swayzee123.github.io/my-history-bot/additionalLessons.json'),
            fetch('https://swayzee123.github.io/my-history-bot/facts.json')
        ]);
        const worldLessons = await worldRes.json();
        const belarusLessons = await belarusRes.json();
        const additional = await additionalRes.json();
        const facts = await factsRes.json();
        
        subjects[0].lessons = worldLessons;
        subjects[1].lessons = additional.personalities;
        subjects[2].lessons = belarusLessons;
        subjects[3].lessons = additional.terms;
        
        historyFacts = facts;
    } catch(e) {
        console.error("Ошибка загрузки данных:", e);
        subjects = subjects.map(s => ({ ...s, lessons: [] }));
        historyFacts = ["📚 Загрузка данных..."];
    }
}

let userProgress = {};

function loadLocalProgress() {
    const saved = localStorage.getItem("history_progress_v2");
    if (saved) userProgress = JSON.parse(saved);
    else userProgress = {};
}
function saveLocalProgress() {
    localStorage.setItem("history_progress_v2", JSON.stringify(userProgress));
}

function getTotalQuestions() {
    let total = 0;
    for (const subject of subjects) {
        subject.lessons.forEach(lesson => { total += lesson.questions.length; });
    }
    return total;
}

function getLessonBestScore(lessonId) {
    return userProgress[lessonId]?.bestScore || 0;
}

function updateLessonProgress(lessonId, score, maxScore) {
    const currentBest = userProgress[lessonId]?.bestScore || 0;
    if (score > currentBest) {
        userProgress[lessonId] = { bestScore: score, totalQuestions: maxScore };
        saveLocalProgress();
        return true;
    }
    return false;
}

function getTotalBestScore() {
    let total = 0;
    for (const subject of subjects) {
        subject.lessons.forEach(lesson => { total += getLessonBestScore(lesson.id); });
    }
    return total;
}

function shuffleArray(arr) {
    for (let i = arr.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [arr[i], arr[j]] = [arr[j], arr[i]];
    }
    return arr;
}

function prepareShuffledLesson(originalLesson) {
    const shuffledQuestions = originalLesson.questions.map(q => ({
        text: q.text,
        options: [...q.options],
        correct: q.correct
    }));
    shuffleArray(shuffledQuestions);
    shuffledQuestions.forEach(q => {
        const correctOption = q.options[q.correct];
        shuffleArray(q.options);
        q.correct = q.options.indexOf(correctOption);
    });
    return {
        id: originalLesson.id,
        title: originalLesson.title,
        questions: shuffledQuestions
    };
}

let currentLesson = null, currentQuestionIndex = 0, currentScore = 0, selectedOption = null, answered = false, currentUser = null, currentTab = "subjects";

async function initUser() {
    const user = tg?.initDataUnsafe?.user;
    if (!user) { currentUser = { id: 123456, name: "Гость", total_score: 0 }; return; }
    currentUser = { id: user.id, name: user.first_name || "Гость", avatar: user.photo_url || null };
    try {
        const { data } = await supabaseClient.from('users').select('*').eq('telegram_id', String(user.id)).single();
        if (!data) await supabaseClient.from('users').insert({ telegram_id: String(user.id), name: currentUser.name, avatar: currentUser.avatar, total_score: 0 });
        else currentUser.total_score = data.total_score || 0;
    } catch(e) { console.log(e); }
}

async function saveResult(score, maxScore, lessonId) {
    if (!currentUser || currentUser.id === 123456) return;
    try {
        updateLessonProgress(lessonId, score, maxScore);
        const totalBest = getTotalBestScore();
        await supabaseClient.from('users').update({ total_score: totalBest }).eq('telegram_id', String(currentUser.id));
        currentUser.total_score = totalBest;
    } catch(e) { console.log(e); }
}

async function loadRating() {
    try {
        const { data } = await supabaseClient.from('users').select('name, total_score').order('total_score', { ascending: false }).limit(20);
        const container = document.getElementById('ratingList');
        if (!data || data.length === 0) { container.innerHTML = '<div class="stat-card">⭐ Пока никого нет</div>'; return; }
        container.innerHTML = data.map((user, i) => {
            let cleanName = (user.name || "Аноним").replace(/[^\p{L}\p{N}\s]/gu, '').substring(0, 20);
            let medal = '';
            if (i === 0) medal = '👑';
            else if (i === 1) medal = '🥈';
            else if (i === 2) medal = '🥉';
            else medal = '📖';
            return `<div class="rank-item"><div class="rank-avatar">${medal}</div><div style="flex:1"><strong>${cleanName}</strong></div><div style="font-weight:bold;color:#d48c9c">${user.total_score || 0} баллов</div></div>`;
        }).join('');
    } catch(e) { document.getElementById('ratingList').innerHTML = '<div class="stat-card">⭐ Рейтинг временно недоступен</div>'; }
}

function renderStats() {
    const totalQuestions = getTotalQuestions();
    const totalBest = getTotalBestScore();
    const percent = totalQuestions ? Math.round((totalBest / totalQuestions) * 100) : 0;
    let freqText = "";
    if (percent >= 80) freqText = "🔥 Ты настоящий историк! 🔥";
    else if (percent >= 50) freqText = "📚 Отлично! Продолжай!";
    else if (percent > 0) freqText = "🌱 Неплохой старт! Учи даты чаще!";
    else freqText = "⭐ Начни учить даты прямо сейчас!";
    document.getElementById('statsContent').innerHTML = `
        <div class="stat-card"><div style="font-size:48px;">📊</div><div style="font-size:48px;font-weight:800;color:#d48c9c;">${percent}%</div><div>правильных ответов</div><div style="background:rgba(212,140,156,0.2);border-radius:10px;height:8px;margin:20px 0;"><div style="width:${percent}%;height:100%;background:linear-gradient(90deg,#d48c9c,#e89f7e);border-radius:10px;"></div></div></div>
        <div class="stat-card"><div style="font-size:48px;">🎯</div><div style="font-size:24px;font-weight:bold;">${totalBest} / ${totalQuestions}</div><div>дат запомнено</div></div>
        <div class="stat-card"><div style="font-size:48px;">⭐</div><div style="font-size:18px;font-weight:bold;">${freqText}</div></div>
    `;
}

function renderMain() {
    const now = new Date(); document.getElementById('currentDate').innerText = `${now.getDate()} ${now.toLocaleString('ru', { month: 'long' })} ${now.getFullYear()}`;
    const container = document.getElementById('subjectsList'); container.innerHTML = '';
    for (const subject of subjects) {
        if (subject.lessons.length === 0) continue;
        const card = document.createElement('div'); card.className = 'subject-card';
        card.innerHTML = `<div class="subject-title">${subject.name}</div>`;
        subject.lessons.forEach(lesson => {
            const bestScore = getLessonBestScore(lesson.id);
            const isCompleted = bestScore === lesson.questions.length;
            const lessonDiv = document.createElement('div'); lessonDiv.className = 'lesson-item';
            lessonDiv.innerHTML = `
                <div class="lesson-title">${lesson.title}</div>
                <div class="lesson-meta">📅 ${lesson.questions.length} ${lesson.id === 200 ? 'терминов' : 'дат'}</div>
                <div class="lesson-status">${isCompleted ? '✅' : ''}</div>
            `;
            lessonDiv.onclick = () => startQuiz(lesson);
            card.appendChild(lessonDiv);
        });
        container.appendChild(card);
    }
}

function renderProfile() {
    const user = tg?.initDataUnsafe?.user;
    const randomFact = historyFacts[Math.floor(Math.random() * historyFacts.length)];
    const avatarHtml = user?.photo_url ? `<img src="${user.photo_url}" style="width:80px;height:80px;border-radius:80px;margin:0 auto 16px;display:block;object-fit:cover;">` : `<div style="width:80px;height:80px;border-radius:80px;background:linear-gradient(135deg,#d48c9c,#e89f7e);margin:0 auto 16px;display:flex;align-items:center;justify-content:center;font-size:40px;">📖</div>`;
    document.getElementById('profileContent').innerHTML = `
        <div class="stat-card">${avatarHtml}<div style="font-size:24px;font-weight:bold;">${user?.first_name || "Гость"}</div><div style="color:#b86f8c;">🏆 ${currentUser?.total_score || 0} баллов</div></div>
        <div class="stat-card"><div style="font-size:18px;margin-bottom:12px;">📖 Исторический факт дня</div><div style="font-size:14px;">${randomFact}</div></div>
    `;
}

function switchTab(tab) {
    currentTab = tab;
    document.querySelectorAll('.tab').forEach(t => t.classList.remove('active')); document.querySelector(`.tab[data-tab="${tab}"]`).classList.add('active');
    document.getElementById('subjectsList').style.display = 'none'; document.getElementById('statsContent').style.display = 'none'; document.getElementById('ratingList').style.display = 'none'; document.getElementById('profileContent').style.display = 'none';
    if (tab === 'subjects') { document.getElementById('subjectsList').style.display = 'block'; renderMain(); }
    if (tab === 'stats') { document.getElementById('statsContent').style.display = 'block'; renderStats(); }
    if (tab === 'rating') { document.getElementById('ratingList').style.display = 'block'; loadRating(); }
    if (tab === 'profile') { document.getElementById('profileContent').style.display = 'block'; renderProfile(); }
}

function startQuiz(lesson) {
    const shuffled = prepareShuffledLesson(lesson);
    currentLesson = shuffled;
    currentQuestionIndex = 0;
    currentScore = 0;
    answered = false;
    document.getElementById('quizTitle').innerText = lesson.title;
    document.getElementById('mainScreen').style.display = 'none';
    document.getElementById('quizScreen').style.display = 'block';
    document.getElementById('resultScreen').style.display = 'none';
    renderQuestion();
}

function renderQuestion() {
    const q = currentLesson.questions[currentQuestionIndex]; if (!q) return finishQuiz();
    document.getElementById('questionText').innerHTML = q.text;
    const percent = (currentQuestionIndex / currentLesson.questions.length) * 100;
    document.getElementById('progressFill').style.width = percent + "%";
    document.getElementById('questionCounter').innerText = `${currentQuestionIndex + 1} / ${currentLesson.questions.length}`;
    const box = document.getElementById('optionsBox'); box.innerHTML = ''; selectedOption = null; answered = false;
    const btn = document.getElementById('actionBtn'); btn.disabled = true; btn.classList.remove('active'); btn.innerText = "Ответить";
    q.options.forEach((opt, i) => { const div = document.createElement('div'); div.className = 'option'; div.innerText = opt; div.onclick = () => { if (answered) return; selectedOption = i; document.querySelectorAll('.option').forEach(o => o.classList.remove('selected')); div.classList.add('selected'); btn.disabled = false; btn.classList.add('active'); }; box.appendChild(div); });
}

function handleAnswer() {
    if (selectedOption === null) return;
    const q = currentLesson.questions[currentQuestionIndex]; const btn = document.getElementById('actionBtn');
    if (!answered) {
        answered = true; document.querySelectorAll('.option').forEach((el, i) => { if (i === q.correct) el.classList.add('correct'); else if (i === selectedOption) el.classList.add('wrong'); });
        if (selectedOption === q.correct) currentScore++; btn.innerText = "Дальше →";
    } else { currentQuestionIndex++; if (currentQuestionIndex < currentLesson.questions.length) renderQuestion(); else finishQuiz(); }
}

async function finishQuiz() {
    await saveResult(currentScore, currentLesson.questions.length, currentLesson.id);
    document.getElementById('quizScreen').style.display = 'none'; document.getElementById('resultScreen').style.display = 'block';
    const percent = Math.round((currentScore / currentLesson.questions.length) * 100);
    document.getElementById('resultScore').innerHTML = `${currentScore}/${currentLesson.questions.length}<div style="font-size:16px;">${percent}%</div>`;
}

function backToMain() {
    document.getElementById('mainScreen').style.display = 'block'; document.getElementById('quizScreen').style.display = 'none'; document.getElementById('resultScreen').style.display = 'none';
    if (currentTab === 'stats') renderStats(); if (currentTab === 'rating') loadRating(); if (currentTab === 'profile') renderProfile(); switchTab(currentTab);
}

function retryQuiz() { currentScore = 0; currentQuestionIndex = 0; answered = false; document.getElementById('resultScreen').style.display = 'none'; document.getElementById('quizScreen').style.display = 'block'; renderQuestion(); }

document.querySelectorAll('.tab').forEach(tab => { tab.addEventListener('click', () => switchTab(tab.dataset.tab)); });

loadLocalProgress();
loadData().then(() => {
    initUser().then(() => {
        renderMain();
        renderStats();
        renderProfile();
        loadRating();
        switchTab('subjects');
    });
});
</script>
</body>
</html>
