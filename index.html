<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            min-height: 100vh;
            padding-bottom: 70px;
            background: linear-gradient(135deg, #fff5f0 0%, #ffe8f0 100%);
        }

        .header {
            background: rgba(255,255,255,0.85);
            backdrop-filter: blur(20px);
            padding: 16px 16px 12px 16px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid rgba(255,200,210,0.3);
        }

        .date-icon {
            font-size: 16px;
            font-weight: 500;
            background: rgba(212,140,156,0.2);
            padding: 8px 16px;
            border-radius: 30px;
            color: #b86f8c;
        }

        .close-btn {
            font-size: 24px;
            cursor: pointer;
            color: #b86f8c;
            background: rgba(255,255,255,0.5);
            border: none;
            width: 40px;
            height: 40px;
            border-radius: 40px;
            font-weight: 500;
        }

        .tabs {
            display: flex;
            background: rgba(255,255,255,0.85);
            backdrop-filter: blur(20px);
            padding: 8px 16px;
            gap: 20px;
            border-bottom: 1px solid rgba(255,200,210,0.3);
            overflow-x: auto;
        }

        .tab {
            font-size: 15px;
            color: #6a5a6a;
            padding: 8px 0;
            cursor: pointer;
            border-bottom: 2px solid transparent;
            white-space: nowrap;
        }

        .tab.active {
            color: #d48c9c;
            border-bottom-color: #d48c9c;
        }

        .content {
            padding: 16px;
        }

        .subject-card {
            background: rgba(255,255,255,0.9);
            backdrop-filter: blur(10px);
            border-radius: 28px;
            padding: 20px;
            margin-bottom: 20px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.05);
        }

        .subject-title {
            font-size: 22px;
            font-weight: 700;
            margin-bottom: 16px;
            background: linear-gradient(135deg, #b86f8c, #e89f7e);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .lesson-item {
            padding: 14px;
            margin-top: 10px;
            background: rgba(255,248,250,0.9);
            border-radius: 20px;
            cursor: pointer;
            border: 1px solid rgba(212,140,156,0.3);
            transition: all 0.2s;
        }

        .lesson-item:active {
            transform: scale(0.98);
        }

        .lesson-title {
            font-weight: 600;
            color: #5a4a5a;
        }

        .lesson-meta {
            font-size: 12px;
            color: #b86f8c;
            margin-top: 6px;
        }

        .quiz-card {
            background: rgba(255,255,255,0.95);
            border-radius: 28px;
            padding: 24px;
            animation: fadeIn 0.3s;
        }

        .question-text {
            font-size: 20px;
            font-weight: 600;
            margin-bottom: 24px;
            color: #4a3a4a;
        }

        .option {
            padding: 14px;
            border: 2px solid rgba(212,140,156,0.3);
            border-radius: 20px;
            margin-bottom: 10px;
            cursor: pointer;
            transition: all 0.2s;
            background: white;
        }

        .option.selected {
            border-color: #d48c9c;
            background: rgba(212,140,156,0.1);
        }

        .option.correct {
            border-color: #9bcd9b;
            background: rgba(155,205,155,0.2);
        }

        .option.wrong {
            border-color: #e89f7e;
            background: rgba(232,159,126,0.15);
        }

        .result-card {
            background: rgba(255,255,255,0.95);
            border-radius: 28px;
            padding: 32px 20px;
            text-align: center;
        }

        .result-score {
            font-size: 56px;
            font-weight: 800;
            background: linear-gradient(135deg, #b86f8c, #e89f7e);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin: 20px 0;
        }

        .footer {
            position: fixed;
            bottom: 0;
            left: 0;
            width: 100%;
            padding: 12px 16px;
            background: rgba(255,255,255,0.9);
            backdrop-filter: blur(20px);
            border-top: 1px solid rgba(255,200,210,0.3);
        }

        .btn-main {
            width: 100%;
            background: linear-gradient(135deg, #d48c9c, #e89f7e);
            color: white;
            border: none;
            padding: 14px;
            border-radius: 24px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            opacity: 0.5;
        }

        .btn-main.active {
            opacity: 1;
        }

        .btn-secondary {
            width: 100%;
            background: rgba(212,140,156,0.2);
            color: #d48c9c;
            border: none;
            padding: 14px;
            border-radius: 24px;
            font-weight: 500;
            margin-top: 12px;
            cursor: pointer;
        }

        .progress-bar {
            height: 8px;
            background: rgba(212,140,156,0.2);
            border-radius: 10px;
            overflow: hidden;
            margin-bottom: 20px;
        }

        .progress-fill {
            height: 100%;
            width: 0%;
            background: linear-gradient(90deg, #d48c9c, #e89f7e);
        }

        .stat-card {
            background: rgba(255,255,255,0.9);
            border-radius: 28px;
            padding: 20px;
            margin-bottom: 16px;
            text-align: center;
        }

        .rank-item {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 12px;
            background: rgba(255,255,255,0.9);
            border-radius: 20px;
            margin-bottom: 8px;
        }

        .rank-avatar {
            width: 44px;
            height: 44px;
            border-radius: 44px;
            background: #d48c9c;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
        }

        .hidden {
            display: none;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(15px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>

<div id="mainScreen">
    <div class="header">
        <div class="date-icon" id="currentDate"></div>
        <button class="close-btn" onclick="tg.close()">✕</button>
    </div>

    <div class="tabs">
        <div class="tab active" data-tab="subjects">📚 История</div>
        <div class="tab" data-tab="rating">🏆 Рейтинг</div>
        <div class="tab" data-tab="profile">👤 Профиль</div>
    </div>

    <div class="content" id="subjectsList"></div>
    <div class="content hidden" id="ratingScreen"></div>
    <div class="content hidden" id="profileScreen"></div>
</div>

<div id="quizScreen" class="hidden">
    <div class="header">
        <button class="close-btn" onclick="backToMain()">←</button>
        <div id="quizTitle"></div>
        <div style="width: 40px;"></div>
    </div>
    <div class="content">
        <div class="progress-bar"><div class="progress-fill" id="progressFill"></div></div>
        <div class="quiz-card">
            <div class="question-text" id="questionText"></div>
            <div id="optionsBox"></div>
        </div>
    </div>
    <div class="footer">
        <button class="btn-main" id="actionBtn" disabled onclick="handleAnswer()">Ответить</button>
    </div>
</div>

<div id="resultScreen" class="hidden">
    <div class="header">
        <button class="close-btn" onclick="backToMain()">←</button>
        <div>Результат</div>
        <div style="width: 40px;"></div>
    </div>
    <div class="content">
        <div class="result-card">
            <div class="result-score" id="resultScore"></div>
            <button class="btn-main" onclick="backToMain()">На главную</button>
            <button class="btn-secondary" onclick="retryQuiz()">Пройти заново</button>
        </div>
    </div>
</div>

<script>
const tg = window.Telegram?.WebApp || { expand: () => {}, close: () => {}, initDataUnsafe: { user: { id: 123456, first_name: "Гость", photo_url: null } } };
tg.expand();
tg.ready();

// ========== SUPABASE ==========
const SUPABASE_URL = "https://roakqdkabmtsemavyseh.supabase.co";
const SUPABASE_KEY = "sb_publishable_dYmhQWEHHhUhcqLbxr6M_w_rhrk_S7z";
const supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

// ========== ДАННЫЕ (уроки и даты) ==========
const subjects = {
    world: { name: "🌍 Всемирная история", lessons: [] },
    belarus: { name: "🇧🇾 История Беларуси", lessons: [] }
};

// Временные уроки (потом добавим твои 138+ дат)
subjects.world.lessons.push({
    id: 1,
    title: "Урок 1. Древний мир",
    questions: [
        { text: "Крещение Руси?", options: ["988 г.", "862 г.", "1054 г."], correct: 0 },
        { text: "Куликовская битва?", options: ["1380 г.", "1240 г.", "1480 г."], correct: 0 }
    ]
});
subjects.belarus.lessons.push({
    id: 2,
    title: "Урок 1. Полоцкое княжество",
    questions: [
        { text: "Первая столица Беларуси?", options: ["Полоцк", "Минск", "Витебск"], correct: 0 }
    ]
});

// ========== ИСТОРИЧЕСКИЕ ФАКТЫ ==========
const historyFacts = [
    "🏛️ Первая библиотека появилась в Древней Греции в III веке до н.э.",
    "📜 Самая древняя из сохранившихся книг — «Алмазная сутра», 868 год.",
    "🌍 Первое кругосветное путешествие совершил Магеллан в 1519 году.",
    "⚔️ Куликовская битва произошла в 1380 году.",
    "📖 Первая печатная книга на Руси — «Апостол», 1564 год.",
    "🏰 Полоцк впервые упоминается в 862 году в летописях.",
    "🎨 Леонардо да Винчи написал «Мону Лизу» в 1503 году.",
    "🚀 Первый полёт человека в космос — 12 апреля 1961 года.",
    "📚 Библиотека Ивана Грозного до сих пор не найдена.",
    "🏛️ Древний Рим был основан в 753 году до н.э."
];

let currentLesson = null;
let currentQuestionIndex = 0;
let currentScore = 0;
let selectedOption = null;
let answered = false;
let currentUser = null;

// ========== ПОЛУЧЕНИЕ/СОЗДАНИЕ ПОЛЬЗОВАТЕЛЯ ==========
async function initUser() {
    const user = tg.initDataUnsafe?.user;
    if (!user) return;
    
    currentUser = {
        id: user.id,
        name: user.first_name || "Гость",
        avatar: user.photo_url || null
    };
    
    // Проверяем, есть ли пользователь в БД
    const { data, error } = await supabase
        .from('users')
        .select('*')
        .eq('telegram_id', String(user.id))
        .single();
    
    if (!data) {
        // Создаём нового пользователя
        await supabase.from('users').insert({
            telegram_id: String(user.id),
            name: currentUser.name,
            avatar: currentUser.avatar,
            total_score: 0
        });
    } else {
        currentUser.total_score = data.total_score || 0;
    }
}

// ========== СОХРАНЕНИЕ РЕЗУЛЬТАТА ==========
async function saveResult(score, maxScore, lessonId) {
    if (!currentUser) return;
    
    await supabase.from('results').insert({
        telegram_id: String(currentUser.id),
        topic_id: lessonId,
        score: score,
        max_score: maxScore
    });
    
    // Обновляем total_score пользователя
    const { data } = await supabase
        .from('results')
        .select('score')
        .eq('telegram_id', String(currentUser.id));
    
    let total = 0;
    data?.forEach(r => total += r.score);
    
    await supabase
        .from('users')
        .update({ total_score: total })
        .eq('telegram_id', String(currentUser.id));
    
    if (currentUser) currentUser.total_score = total;
}

// ========== ЗАГРУЗКА РЕЙТИНГА ==========
async function loadRating() {
    const { data, error } = await supabase
        .from('users')
        .select('name, avatar, total_score')
        .order('total_score', { ascending: false })
        .limit(20);
    
    const container = document.getElementById('ratingScreen');
    if (!data || data.length === 0) {
        container.innerHTML = '<div class="stat-card">⭐ Пока никого нет. Пройди викторину первым!</div>';
        return;
    }
    
    container.innerHTML = data.map((user, i) => `
        <div class="rank-item">
            <div class="rank-avatar">${user.avatar ? `<img src="${user.avatar}" style="width:44px;height:44px;border-radius:44px;">` : (i === 0 ? '🏆' : (i === 1 ? '🥈' : (i === 2 ? '🥉' : '📖'))) }</div>
            <div style="flex:1"><strong>${user.name}</strong></div>
            <div style="font-weight:bold;color:#d48c9c">${user.total_score || 0} баллов</div>
        </div>
    `).join('');
}

// ========== ОТОБРАЖЕНИЕ ГЛАВНОЙ ==========
function renderMain() {
    document.getElementById('currentDate').innerText = new Date().toLocaleDateString('ru-RU', { day: 'numeric', month: 'long', year: 'numeric' });
    
    const container = document.getElementById('subjectsList');
    container.innerHTML = '';
    
    for (const key in subjects) {
        const subject = subjects[key];
        const card = document.createElement('div');
        card.className = 'subject-card';
        card.innerHTML = `<div class="subject-title">${subject.name}</div>`;
        
        subject.lessons.forEach(lesson => {
            const lessonDiv = document.createElement('div');
            lessonDiv.className = 'lesson-item';
            lessonDiv.innerHTML = `
                <div class="lesson-title">${lesson.title}</div>
                <div class="lesson-meta">📅 ${lesson.questions.length} дат</div>
            `;
            lessonDiv.onclick = () => startQuiz(lesson);
            card.appendChild(lessonDiv);
        });
        container.appendChild(card);
    }
}

// ========== ПРОФИЛЬ ==========
function renderProfile() {
    const user = tg.initDataUnsafe?.user;
    const randomFact = historyFacts[Math.floor(Math.random() * historyFacts.length)];
    
    const avatarHtml = user?.photo_url 
        ? `<img src="${user.photo_url}" style="width:80px;height:80px;border-radius:80px;margin:0 auto 16px;display:block;">`
        : `<div style="width:80px;height:80px;border-radius:80px;background:linear-gradient(135deg,#d48c9c,#e89f7e);margin:0 auto 16px;display:flex;align-items:center;justify-content:center;font-size:40px;">📖</div>`;
    
    document.getElementById('profileScreen').innerHTML = `
        <div class="stat-card">
            ${avatarHtml}
            <div style="font-size:24px;font-weight:bold;margin-bottom:8px;">${user?.first_name || "Гость"}</div>
            <div style="color:#b86f8c;">🏆 ${currentUser?.total_score || 0} баллов</div>
        </div>
        <div class="stat-card">
            <div style="font-size:18px;margin-bottom:12px;">📖 Исторический факт дня</div>
            <div style="font-size:14px;line-height:1.5;">${randomFact}</div>
        </div>
    `;
}

// ========== ВИКТОРИНА ==========
function startQuiz(lesson) {
    currentLesson = lesson;
    currentQuestionIndex = 0;
    currentScore = 0;
    answered = false;
    
    document.getElementById('quizTitle').innerText = lesson.title;
    document.getElementById('mainScreen').classList.add('hidden');
    document.getElementById('quizScreen').classList.remove('hidden');
    renderQuestion();
}

function renderQuestion() {
    const q = currentLesson.questions[currentQuestionIndex];
    if (!q) return finishQuiz();
    
    document.getElementById('questionText').innerHTML = q.text;
    document.getElementById('progressFill').style.width = (currentQuestionIndex / currentLesson.questions.length) * 100 + "%";
    
    const box = document.getElementById('optionsBox');
    box.innerHTML = '';
    selectedOption = null;
    answered = false;
    
    const btn = document.getElementById('actionBtn');
    btn.disabled = true;
    btn.classList.remove('active');
    btn.innerText = "Ответить";
    
    q.options.forEach((opt, i) => {
        const div = document.createElement('div');
        div.className = 'option';
        div.innerText = opt;
        div.onclick = () => {
            if (answered) return;
            selectedOption = i;
            document.querySelectorAll('.option').forEach(o => o.classList.remove('selected'));
            div.classList.add('selected');
            btn.disabled = false;
            btn.classList.add('active');
        };
        box.appendChild(div);
    });
}

function handleAnswer() {
    if (selectedOption === null) return;
    
    const q = currentLesson.questions[currentQuestionIndex];
    const btn = document.getElementById('actionBtn');
    
    if (!answered) {
        answered = true;
        document.querySelectorAll('.option').forEach((el, i) => {
            if (i === q.correct) el.classList.add('correct');
            else if (i === selectedOption) el.classList.add('wrong');
        });
        if (selectedOption === q.correct) currentScore++;
        btn.innerText = "Дальше →";
    } else {
        currentQuestionIndex++;
        if (currentQuestionIndex < currentLesson.questions.length) renderQuestion();
        else finishQuiz();
    }
}

async function finishQuiz() {
    await saveResult(currentScore, currentLesson.questions.length, currentLesson.id);
    
    document.getElementById('quizScreen').classList.add('hidden');
    document.getElementById('resultScreen').classList.remove('hidden');
    document.getElementById('resultScore').innerHTML = `${currentScore}/${currentLesson.questions.length}<div style="font-size:16px;">${Math.round(currentScore/currentLesson.questions.length*100)}%</div>`;
}

function backToMain() {
    document.getElementById('mainScreen').classList.remove('hidden');
    document.getElementById('quizScreen').classList.add('hidden');
    document.getElementById('resultScreen').classList.add('hidden');
    renderMain();
    renderProfile();
    loadRating();
}

function retryQuiz() {
    currentScore = 0;
    currentQuestionIndex = 0;
    answered = false;
    document.getElementById('resultScreen').classList.add('hidden');
    document.getElementById('quizScreen').classList.remove('hidden');
    renderQuestion();
}

// ========== ТАБЫ ==========
function switchTab(tab) {
    document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
    document.querySelector(`.tab[data-tab="${tab}"]`).classList.add('active');
    
    document.getElementById('subjectsList').parentElement.classList.add('hidden');
    document.getElementById('ratingScreen').classList.add('hidden');
    document.getElementById('profileScreen').classList.add('hidden');
    
    if (tab === 'subjects') document.getElementById('subjectsList').parentElement.classList.remove('hidden');
    if (tab === 'rating') { document.getElementById('ratingScreen').classList.remove('hidden'); loadRating(); }
    if (tab === 'profile') document.getElementById('profileScreen').classList.remove('hidden');
}

document.querySelectorAll('.tab').forEach(tab => {
    tab.addEventListener('click', () => switchTab(tab.dataset.tab));
});

// ========== ЗАПУСК ==========
(async function() {
    await initUser();
    renderMain();
    renderProfile();
    loadRating();
    switchTab('subjects');
})();
</script>

</body>
</html>
