<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <script src="https://telegram.org"></script>
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; background: #fff; margin: 0; padding: 20px; color: #333; -webkit-tap-highlight-color: transparent; }
        .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; color: #8e8e93; font-size: 13px; }
        .back-btn { font-size: 24px; cursor: pointer; color: #000; }
        .question-text { font-size: 17px; font-weight: 600; line-height: 1.4; margin-bottom: 25px; }
        
        .options-container { margin-bottom: 100px; }
        
        /* Базовый стиль кнопки-варианта */
        .option {
            display: flex; align-items: center; padding: 16px; border: 1px solid #e5e5ea;
            border-radius: 12px; margin-bottom: 10px; cursor: pointer; position: relative;
            transition: all 0.2s ease;
        }

        /* Кастомный квадратик слева */
        .check-icon {
            width: 20px; height: 20px; border: 2px solid #d1d1d6; border-radius: 4px;
            margin-right: 12px; flex-shrink: 0; display: flex; align-items: center; justify-content: center;
            font-size: 14px; font-weight: bold;
        }

        /* Когда вариант просто выбран пользователем */
        .option.selected { border-color: #3478f6; background-color: #f2f8ff; }
        .option.selected .check-icon { border-color: #3478f6; background-color: #3478f6; color: #fff; }
        .option.selected .check-icon::after { content: "✓"; }

        /* Состояние ПРАВИЛЬНО (Зеленый) */
        .option.correct { background-color: #e8f9ee; border-color: #4cd964; pointer-events: none; }
        .option.correct .check-icon { border-color: #4cd964; background-color: #4cd964; color: #fff; }
        .option.correct .check-icon::after { content: "✓"; }
        .option.correct::after { content: "✓"; position: absolute; right: 20px; color: #4cd964; font-size: 20px; }

        /* Состояние НЕПРАВИЛЬНО (Красный) */
        .option.wrong { background-color: #fff2f1; border-color: #ff3b30; pointer-events: none; }
        .option.wrong .check-icon { border-color: #ff3b30; background-color: #ff3b30; color: #fff; }
        .option.wrong .check-icon::after { content: "✕"; }
        .option.wrong::after { content: "✕"; position: absolute; right: 20px; color: #ff3b30; font-size: 20px; }

        /* Подсказка правильного ответа (если пользователь не угадал) */
        .option.should-have { background-color: #fff2f1; border-color: #ff3b30; pointer-events: none; }
        .option.should-have::after { content: "✓"; position: absolute; right: 20px; color: #ff3b30; font-size: 20px; }

        .footer { position: fixed; bottom: 0; left: 0; width: 100%; padding: 16px 20px; background: #fff; border-top: 1px solid #efeff4; display: flex; justify-content: space-between; align-items: center; box-sizing: border-box; }
        .btn-main { background: #ff5722; color: #fff; border: none; padding: 14px 35px; border-radius: 10px; font-size: 16px; font-weight: bold; cursor: pointer; transition: opacity 0.2s; }
        .btn-main:disabled { background: #ffccbc; cursor: not-allowed; }
        .btn-next { background: #3478f6; } /* Цвет кнопки для перехода к след. вопросу */
        .progress { color: #8e8e93; font-size: 16px; }
    </style>
</head>
<body>

    <div class="header">
        <div class="back-btn" onclick="tg.close()">✕</div>
        <div>1 / 20</div>
    </div>

    <div class="question-text" id="q-text">Загрузка вопроса...</div>

    <div class="options-container" id="options-box"></div>

    <div class="footer">
        <button class="btn-main" id="action-btn" onclick="handleButtonClick()" disabled>Ответить</button>
        <div class="progress" id="counter">1 / 20</div>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();

        const questions =, correct: 0 },
            { text: "Год основания Москвы?", options: ["1147 год", "1380 год", "1547 год"], correct: 0 },
            { text: "Начало Первой мировой войны?", options: ["1914 год", "1939 год", "1917 год"], correct: 0 }
        ];

        let currentQ = 0;
        let selectedIdx = null;
        let isAnswered = false;

        function render() {
            const q = questions[currentQ];
            document.getElementById('q-text').innerText = q.text;
            document.getElementById('counter').innerText = `${currentQ + 1} / ${questions.length}`;
            
            const box = document.getElementById('options-box');
            box.innerHTML = '';
            isAnswered = false;
            selectedIdx = null;
            
            const btn = document.getElementById('action-btn');
            btn.innerText = "Ответить";
            btn.disabled = true;
            btn.classList.remove('btn-next');

            q.options.forEach((opt, i) => {
                const div = document.createElement('div');
                div.className = 'option';
                div.innerHTML = `<div class="check-icon"></div><span>${opt}</span>`;
                div.onclick = () => select(i, div);
                box.appendChild(div);
            });
        }

        function select(idx, el) {
            if (isAnswered) return;
            selectedIdx = idx;
            document.querySelectorAll('.option').forEach(item => item.classList.remove('selected'));
            el.classList.add('selected');
            document.getElementById('action-btn').disabled = false;
        }

        function handleButtonClick() {
            if (!isAnswered) {
                check();
            } else {
                next();
            }
        }

        function check() {
            isAnswered = true;
            const q = questions[currentQ];
            const options = document.querySelectorAll('.option');
            const btn = document.getElementById('action-btn');

            options.forEach((el, i) => {
                el.classList.remove('selected');
                if (i === q.correct) {
                    el.classList.add('correct'); // Правильный всегда зеленый
                } else if (i === selectedIdx) {
                    el.classList.add('wrong'); // Если выбрал неверно - этот красный
                }
            });

            btn.innerText = "Дальше";
            btn.classList.add('btn-next');
        }

        function next() {
            currentQ++;
            if (currentQ < questions.length) {
                render();
            } else {
                alert("Тест завершен!");
                tg.close();
            }
        }

        render();
    </script>
</body>
</html>
