<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <script src="https://telegram.org/js/telegram-web-app.js"></script>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background: #f5f6fa;
            color: #333;
            padding-bottom: 70px;
        }

        .header {
            background: #fff;
            padding: 12px 16px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid #efeff4;
            position: sticky;
            top: 0;
            z-index: 10;
        }

        .close-btn {
            font-size: 24px;
            cursor: pointer;
            color: #000;
            background: none;
            border: none;
            font-weight: 500;
        }

        .tabs {
            display: flex;
            background: #fff;
            padding: 8px 16px;
            gap: 24px;
            border-bottom: 1px solid #efeff4;
        }

        .tab {
            font-size: 15px;
            color: #8e8e93;
            padding-bottom: 8px;
            cursor: pointer;
            border-bottom: 2px solid transparent;
        }

        .tab.active {
            color: #3478f6;
            border-bottom-color: #3478f6;
        }

        .content {
            padding: 16px;
        }

        .subject-card {
            background: #fff;
            border-radius: 16px;
            padding: 16px;
            margin-bottom: 12px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.04);
        }

        .subject-name {
            font-size: 18px;
            font-weight: 600;
            margin-bottom: 12px;
        }

        .topic-item {
            padding: 12px;
            margin-top: 8px;
            background: #f8f9fc;
            border-radius: 12px;
            cursor: pointer;
            border: 1px solid #efeff4;
        }

        .topic-title {
            font-weight: 500;
            margin-bottom: 6px;
        }

        .topic-meta {
            font-size: 12px;
            color: #8e8e93;
        }

        .quiz-card {
            background: #fff;
            border-radius: 18px;
            padding: 20px;
            animation: fadeIn 0.3s ease;
        }

        .question-text {
            font-size: 18px;
            font-weight: 600;
            margin-bottom: 20px;
        }

        .option {
            padding: 14px;
            border: 1px solid #e5e5ea;
            border-radius: 12px;
            margin-bottom: 10px;
            cursor: pointer;
        }

        .option.selected {
            border-color: #3478f6;
            background-color: #f2f8ff;
        }

        .option.correct {
            border-color: #4cd964;
            background-color: #e8f9ee;
        }

        .option.wrong {
            border-color: #ff3b30;
            background-color: #fff2f1;
        }

        .result-card {
            background: #fff;
            border-radius: 18px;
            padding: 32px 20px;
            text-align: center;
        }

        .result-score {
            font-size: 48px;
            font-weight: 700;
            color: #3478f6;
            margin: 20px 0;
        }

        .footer {
            position: fixed;
            bottom: 0;
            left: 0;
            width: 100%;
            padding: 12px 16px;
            background: #fff;
            border-top: 1px solid #efeff4;
        }

        .btn-main {
            width: 100%;
            background: #3478f6;
            color: #fff;
            border: none;
            padding: 14px;
            border-radius: 12px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            opacity: 0.5;
        }

        .btn-main.active {
            opacity: 1;
        }

        .progress-bar {
            height: 6px;
            background: #e5e5ea;
            border-radius: 10px;
            overflow: hidden;
            margin-bottom: 18px;
        }

        .progress-fill {
            height: 100%;
            width: 0%;
            background: #3478f6;
            transition: width 0.4s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(15px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .hidden {
            display: none;
        }
    </style>
</head>
<body>

<div id="mainScreen">
    <div class="header">
        <div></div>
        <button class="close-btn" onclick="tg.close()">✕</button>
    </div>

    <div class="tabs">
        <div class="tab active" data-tab="subjects">предметы</div>
        <div class="tab" data-tab="statistics">статистика</div>
        <div class="tab" data-tab="profile">профиль</div>
    </div>

    <div class="content" id="subjectsList"></div>
    <div class="content hidden" id="statisticsScreen"></div>
    <div class="content hidden" id="profileScreen"></div>
</div>

<div id="quizScreen" class="hidden">
    <div class="header">
        <button class="close-btn" onclick="backToMain()">←</button>
        <div id="quizTitle"></div>
        <div style="width: 24px;"></div>
    </div>
    <div class="content">
        <div class="progress-bar">
            <div class="progress-fill" id="progress-fill"></div>
        </div>
        <div class="quiz-card">
            <div class="question-text" id="q-text"></div>
            <div id="options-box"></div>
        </div>
    </div>
    <div class="footer">
        <button class="btn-main" id="action-btn" disabled onclick="handleAnswer()">Ответить</button>
    </div>
</div>

<div id="resultScreen" class="hidden">
    <div class="header">
        <button class="close-btn" onclick="backToMain()">←</button>
        <div>Результат</div>
        <div style="width: 24px;"></div>
    </div>
    <div class="content">
        <div class="result-card">
            <div class="result-score" id="resultScore"></div>
            <button class="btn-main" onclick="backToMain()">На главную</button>
            <button class="btn-secondary" onclick="retryQuiz()">Заново</button>
        </div>
    </div>
</div>

<script>
const tg = window.Telegram?.WebApp || {
    expand: () => {},
    close: () => {}
};

// ТВОИ ДАННЫЕ - меняй здесь
const subjects = {
    обществоведение: {
        topics: [
            {
                id: 1,
                title: "Тема 1",
                questions: [
                    { text: "Вопрос 1?", options: ["Ответ 1", "Ответ 2", "Ответ 3"], correct: 0 },
                    { text: "Вопрос 2?", options: ["Ответ 1", "Ответ 2", "Ответ 3"], correct: 1 }
                ]
            },
            {
                id: 2,
                title: "Тема 2",
                questions: [
                    { text: "Вопрос 1?", options: ["Ответ 1", "Ответ 2"], correct: 0 }
                ]
            }
        ]
    },
    история: {
        topics: [
            {
                id: 3,
                title: "Тема 1",
                questions: [
                    { text: "Вопрос?", options: ["Вариант", "Вариант", "Вариант"], correct: 0 }
                ]
            }
        ]
    }
};

let currentTopic = null;
let currentQuestionIndex = 0;
let currentScore = 0;
let selectedOption = null;
let answered = false;
let userProgress = {};

function init() {
    tg.expand();
    loadProgress();
    renderSubjects();
    
    document.querySelectorAll('.tab').forEach(tab => {
        tab.addEventListener('click', () => {
            document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
            tab.classList.add('active');
            
            document.getElementById('subjectsList').classList.add('hidden');
            document.getElementById('statisticsScreen').classList.add('hidden');
            document.getElementById('profileScreen').classList.add('hidden');
            
            if (tab.dataset.tab === 'subjects') {
                document.getElementById('subjectsList').classList.remove('hidden');
                renderSubjects();
            } else if (tab.dataset.tab === 'statistics') {
                document.getElementById('statisticsScreen').classList.remove('hidden');
                renderStatistics();
            } else if (tab.dataset.tab === 'profile') {
                document.getElementById('profileScreen').classList.remove('hidden');
                document.getElementById('profileScreen').innerHTML = '<div style="text-align:center;padding:40px;">👤 Профиль</div>';
            }
        });
    });
}

function renderSubjects() {
    const container = document.getElementById('subjectsList');
    container.innerHTML = '';
    
    for (const [name, data] of Object.entries(subjects)) {
        const card = document.createElement('div');
        card.className = 'subject-card';
        card.innerHTML = `<div class="subject-name">${name}</div>`;
        
        data.topics.forEach(topic => {
            const progress = userProgress[topic.id];
            const div = document.createElement('div');
            div.className = 'topic-item';
            div.onclick = () => startQuiz(topic);
            div.innerHTML = `
                <div class="topic-title">${topic.title}</div>
                <div class="topic-meta">${progress ? `${progress.bestScore}/${topic.questions.length}` : `${topic.questions.length} вопросов`}</div>
            `;
            card.appendChild(div);
        });
        container.appendChild(card);
    }
}

function renderStatistics() {
    let total = 0, correct = 0;
    for (const [name, data] of Object.entries(subjects)) {
        data.topics.forEach(topic => {
            const progress = userProgress[topic.id];
            if (progress) {
                total += topic.questions.length;
                correct += progress.bestScore;
            }
        });
    }
    document.getElementById('statisticsScreen').innerHTML = `
        <div style="text-align:center;padding:40px;">
            <div style="font-size:48px;margin-bottom:20px;">📊</div>
            <div style="font-size:32px;font-weight:bold;">${total ? Math.round(correct/total*100) : 0}%</div>
            <div style="margin-top:20px;">✅ ${correct} / ${total}</div>
        </div>
    `;
}

function startQuiz(topic) {
    currentTopic = topic;
    currentQuestionIndex = 0;
    currentScore = 0;
    answered = false;
    
    document.getElementById('quizTitle').innerText = topic.title;
    document.getElementById('mainScreen').classList.add('hidden');
    document.getElementById('quizScreen').classList.remove('hidden');
    document.getElementById('resultScreen').classList.add('hidden');
    
    renderQuestion();
}

function renderQuestion() {
    const q = currentTopic.questions[currentQuestionIndex];
    if (!q) return finishQuiz();
    
    document.getElementById('q-text').innerText = q.text;
    document.getElementById('progress-fill').style.width = (currentQuestionIndex / currentTopic.questions.length) * 100 + "%";
    
    const box = document.getElementById('options-box');
    box.innerHTML = '';
    selectedOption = null;
    answered = false;
    
    const btn = document.getElementById('action-btn');
    btn.disabled = true;
    btn.classList.remove('active');
    btn.innerText = "Ответить";
    
    q.options.forEach((opt, i) => {
        const div = document.createElement('div');
        div.className = 'option';
        div.innerText = opt;
        div.onclick = () => {
            if (answered) return;
            selectedOption = i;
            document.querySelectorAll('.option').forEach(o => o.classList.remove('selected'));
            div.classList.add('selected');
            btn.disabled = false;
            btn.classList.add('active');
        };
        box.appendChild(div);
    });
}

function handleAnswer() {
    if (selectedOption === null) return;
    
    const q = currentTopic.questions[currentQuestionIndex];
    const btn = document.getElementById('action-btn');
    
    if (!answered) {
        answered = true;
        
        document.querySelectorAll('.option').forEach((el, i) => {
            if (i === q.correct) el.classList.add('correct');
            else if (i === selectedOption) el.classList.add('wrong');
        });
        
        if (selectedOption === q.correct) currentScore++;
        
        btn.innerText = "Дальше";
    } else {
        currentQuestionIndex++;
        if (currentQuestionIndex < currentTopic.questions.length) renderQuestion();
        else finishQuiz();
    }
}

function finishQuiz() {
    if (!userProgress[currentTopic.id]) userProgress[currentTopic.id] = { bestScore: 0 };
    if (currentScore > userProgress[currentTopic.id].bestScore) {
        userProgress[currentTopic.id].bestScore = currentScore;
    }
    saveProgress();
    
    document.getElementById('quizScreen').classList.add('hidden');
    document.getElementById('resultScreen').classList.remove('hidden');
    document.getElementById('resultScore').innerText = `${currentScore}/${currentTopic.questions.length}`;
}

function backToMain() {
    document.getElementById('mainScreen').classList.remove('hidden');
    document.getElementById('quizScreen').classList.add('hidden');
    document.getElementById('resultScreen').classList.add('hidden');
    renderSubjects();
}

function retryQuiz() {
    currentScore = 0;
    currentQuestionIndex = 0;
    answered = false;
    document.getElementById('resultScreen').classList.add('hidden');
    document.getElementById('quizScreen').classList.remove('hidden');
    renderQuestion();
}

function saveProgress() {
    localStorage.setItem('progress', JSON.stringify(userProgress));
}

function loadProgress() {
    const saved = localStorage.getItem('progress');
    if (saved) userProgress = JSON.parse(saved);
}

window.addEventListener('DOMContentLoaded', init);
</script>

</body>
</html>
