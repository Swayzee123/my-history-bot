<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <script src="https://telegram.org"></script>
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; background: #fff; margin: 0; padding: 20px; color: #333; }
        .header { display: flex; align-items: center; margin-bottom: 20px; }
        .back-btn { font-size: 24px; cursor: pointer; margin-right: 15px; color: #888; }
        .task-title { font-size: 14px; color: #888; font-weight: 500; }
        .question-text { font-size: 18px; font-weight: bold; line-height: 1.4; margin-bottom: 25px; margin-top: 10px; }
        .option { display: flex; align-items: center; padding: 18px; border: 1px solid #efeff3; border-radius: 12px; margin-bottom: 12px; cursor: pointer; transition: background 0.2s; }
        .option:active { background: #f5f5f7; }
        .option input { width: 22px; height: 22px; margin-right: 15px; accent-color: #3478f6; }
        .footer { position: fixed; bottom: 0; left: 0; width: 100%; padding: 20px; background: white; border-top: 1px solid #efeff3; display: flex; justify-content: space-between; align-items: center; box-sizing: border-box; }
        .btn-send { background: #a5caff; color: white; border: none; padding: 14px 40px; border-radius: 10px; font-weight: bold; font-size: 16px; width: 65%; transition: background 0.3s; }
        .btn-active { background: #3478f6; }
        .counter { color: #888; font-size: 16px; font-weight: 500; }
    </style>
</head>
<body>
    <div class="header">
        <div class="back-btn" onclick="tg.close()">←</div>
        <div class="task-title">Задание по истории</div>
    </div>

    <div class="question-text">В каком году произошло Крещение Руси?</div>

    <div class="options">
        <label class="option" onclick="activateBtn()">
            <input type="radio" name="q" value="988"> 988 год
        </label>
        <label class="option" onclick="activateBtn()">
            <input type="radio" name="q" value="1147"> 1147 год
        </label>
        <label class="option" onclick="activateBtn()">
            <input type="radio" name="q" value="1242"> 1242 год
        </label>
    </div>

    <div class="footer">
        <button class="btn-send" id="sendBtn" onclick="sendResult()">Ответить</button>
        <span class="counter">1 / 10</span>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();
        tg.ready();

        function activateBtn() {
            document.getElementById('sendBtn').classList.add('btn-active');
        }

        function sendResult() {
            const selected = document.querySelector('input[name="q"]:checked');
            if (selected) {
                if (selected.value === "988") {
                    alert("Правильно!");
                    tg.close();
                } else {
                    alert("Неверно, попробуй еще раз.");
                }
            }
        }
    </script>
</body>
</html>
