<!DOCTYPE html>
<html>
<head>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
</head>
<body>
    <h1>Тест</h1>
    <script>
        const tg = window.Telegram?.WebApp;
        if (tg) {
            tg.expand();
            tg.ready();
            document.body.innerHTML += "<p>✅ WebApp работает, пользователь: " + (tg.initDataUnsafe?.user?.first_name || "неизвестно") + "</p>";
        } else {
            document.body.innerHTML += "<p>❌ Не в Telegram</p>";
        }
    </script>
</body>
</html>
