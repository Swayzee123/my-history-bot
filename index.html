<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <script src="https://telegram.org/js/telegram-web-app.js"></script>

    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background: #f5f6fa;
            margin: 0;
            padding: 20px;
            color: #333;
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 12px;
            color: #8e8e93;
            font-size: 13px;
        }

        .close-btn {
            font-size: 24px;
            cursor: pointer;
            color: #000;
        }

        /* Progress bar */
        .progress-bar {
            height: 6px;
            background: #e5e5ea;
            border-radius: 10px;
            overflow: hidden;
            margin-bottom: 18px;
        }

        .progress-fill {
            height: 100%;
            width: 0%;
            background: linear-gradient(90deg, #3478f6, #6aa8ff);
            transition: width 0.4s ease;
        }

        /* Card */
        .card {
            background: #fff;
            border-radius: 18px;
            padding: 20px;
            box-shadow: 0 12px 30px rgba(0,0,0,0.08);
            animation: fadeIn 0.4s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(15px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .question-text {
            font-size: 18px;
            font-weight: 600;
            margin-bottom: 20px;
        }

        .option {
            display: flex;
            align-items: center;
            padding: 14px;
            border: 1px solid #e5e5ea;
            border-radius: 12px;
            margin-bottom: 10px;
            cursor: pointer;
            transition: 0.2s;
        }

        .option:hover {
            background: #f2f8ff;
        }

        .option.selected {
            border-color: #3478f6;
            background-color: #f2f8ff;
        }

        .option.correct {
            border-color: #4cd964;
            background-color: #e8f9ee;
        }

        .option.wrong {
            border-color: #ff3b30;
            background-color: #fff2f1;
        }

        .footer {
            position: fixed;
            bottom: 0;
            left: 0;
            width: 100%;
            padding: 16px 20px;
            background: #fff;
            border-top: 1px solid #efeff4;
            box-sizing: border-box;
        }

        /* Gradient button */
        .btn-main {
            width: 100%;
            background: linear-gradient(90deg, #3478f6, #6aa8ff);
            color: #fff;
            border: none;
            padding: 14px;
            border-radius: 12px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            opacity: 0.5;
            transition: 0.2s;
        }

        .btn-main.active {
            opacity: 1;
        }
    </style>
</head>
<body>

<div class="header">
    <div class="close-btn" onclick="tg.close()">✕</div>
    <div id="counter">1 / 10</div>
</div>

<div class="progress-bar">
    <div class="progress-fill" id="progress-fill"></div>
</div>

<div class="card">
    <div class="question-text" id="q-text">Загрузка...</div>
    <div id="options-box"></div>
</div>

<div class="footer">
    <button class="btn-main" id="action-btn" disabled onclick="handleClick()">Ответить</button>
</div>

<script>
const tg = window.Telegram?.WebApp || {
    expand: () => {},
    ready: () => {},
    close: () => {}
};

const questions = [
    { text: "Когда произошло Крещение Руси?", options: ["988 год", "1054 год", "862 год"], correct: 0 },
    { text: "В каком году была Куликовская битва?", options: ["1240 год", "1380 год", "1480 год"], correct: 1 },
    { text: "Основание Санкт-Петербурга?", options: ["1703 год", "1721 год", "1712 год"], correct: 0 }
];

let current = 0;
let selected = null;
let answered = false;

function render() {
    const q = questions[current];
    document.getElementById('q-text').innerText = q.text;
    document.getElementById('counter').innerText = `${current+1} / ${questions.length}`;

    const percent = (current / questions.length) * 100;
    document.getElementById('progress-fill').style.width = percent + "%";

    const box = document.getElementById('options-box');
    box.innerHTML = '';
    selected = null;
    answered = false;

    const btn = document.getElementById('action-btn');
    btn.disabled = true;
    btn.classList.remove('active');
    btn.innerText = "Ответить";

    q.options.forEach((opt, i) => {
        const div = document.createElement('div');
        div.className = 'option';
        div.innerText = opt;
        div.onclick = () => selectOption(i, div);
        box.appendChild(div);
    });
}

function selectOption(i, el) {
    if (answered) return;
    selected = i;
    document.querySelectorAll('.option').forEach(o => o.classList.remove('selected'));
    el.classList.add('selected');

    const btn = document.getElementById('action-btn');
    btn.disabled = false;
    btn.classList.add('active');
}

function handleClick() {
    const q = questions[current];
    const btn = document.getElementById('action-btn');

    if (!answered) {
        answered = true;
        document.querySelectorAll('.option').forEach((el, i) => {
            if (i === q.correct) el.classList.add('correct');
            else if (i === selected) el.classList.add('wrong');
        });
        btn.innerText = "Дальше";
    } else {
        current++;
        if (current < questions.length) render();
        else {
            alert("Готово!");
            tg.close();
        }
    }
}

window.addEventListener('DOMContentLoaded', () => {
    tg.expand();
    tg.ready();
    render();
});
</script>

</body>
</html>
